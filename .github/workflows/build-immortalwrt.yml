name: Build ImmortalWrt for aw1000

on:
  workflow_dispatch:
  push:
    branches: [main]

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: master

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies & Setup Swap
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools rsync swig curl wget file unzip zlib1g-dev \
            libelf-dev libudev-dev cmake ccache
          free -h; df -h /
          sudo swapoff -a 2>/dev/null; sleep 1
          SWAPFILE="$(mktemp -p /tmp -u).swap"
          sudo dd if=/dev/zero of="$SWAPFILE" bs=1M count=4096 2>&1
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"
          free -h

      - name: Clone ImmortalWrt
        run: |
          git clone ${{ env.REPO_URL }} --depth=1 -b ${{ env.REPO_BRANCH }} openwrt
          cd openwrt
          echo "src-git daed https://github.com/QiuSimons/DAED" >> feeds.conf.default
          echo "src-git qmodem https://github.com/FUjr/QModem.git^main" >> feeds.conf.default

      - name: Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure Target & Kernel
        run: |
          cd openwrt
          cat >> .config << 'EOF'
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_ipq807x=y
          CONFIG_TARGET_qualcommax_ipq807x_DEVICE_arcadyan_aw1000=y
          CONFIG_TARGET_ROOTFS_SQUASHFS=y
          CONFIG_PACKAGE_daed=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_kmod-sched-bpf=y
          CONFIG_PACKAGE_kmod-sched-core=y
          CONFIG_PACKAGE_kmod-veth=y
          CONFIG_PACKAGE_kmod-xdp-sockets-diag=y
          CONFIG_NETKIT=y
          CONFIG_PACKAGE_luci-proto-mbim=y
          CONFIG_PACKAGE_luci-app-qmodem=y
          CONFIG_PACKAGE_luci-app-qmodem-sms=y
          CONFIG_PACKAGE_luci-i18n-qmodem-zh-cn=y
          EOF
          make defconfig

      - name: Download Sources
        run: cd openwrt && make download -j4

      - name: Build Toolchain
        run: cd openwrt && make tools/install -j2 && make toolchain/install -j2

      - name: Build Firmware
        run: |
          cd openwrt
          make -j2 2>&1 || make -j1 V=s 2>&1

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-aw1000
          path: openwrt/bin/targets/*
          retention-days: 7
